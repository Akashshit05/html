<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TL K Bolo 😂</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Comic Sans MS', cursive;
    }

    body {
      background: linear-gradient(135deg, #ff4d4d, #ffcc00);
      height: 100vh;
      overflow: hidden;
      position: relative;
      transition: background 0.4s ease;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      text-align: center;
      color: #fff;
    }

    h1 {
      font-size: 60px;
      animation: bounce 1s infinite alternate;
      text-shadow: 3px 3px 0 #000;
    }

    #text {
      margin-top: 20px;
      font-size: 22px;
      animation: shake 0.5s infinite;
      cursor: pointer;
    }

    .small-text {
      margin-top: 10px;
      font-weight: bold;
    }

    .bolo-text {
      margin-top: 20px;
      font-size: 26px;
      font-weight: bold;
      cursor: pointer;
      display: inline-block;
      padding: 10px 20px;
      background: #000;
      border-radius: 50px;
      transition: 0.3s;
    }

    .bolo-text:hover {
      background: #fff;
      color: #000;
      transform: scale(1.2) rotate(5deg);
    }

    .emoji {
      position: absolute;
      font-size: 30px;
      animation: float 5s linear infinite;
    }

    @keyframes bounce {
      from { transform: translateY(0); }
      to { transform: translateY(-30px); }
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-5px); }
      100% { transform: translateX(0); }
    }

    @keyframes float {
      0% {
        transform: translateY(100vh) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh) rotate(360deg);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

<div class="container" id="container">
  <h1 id="title">TL কে বলো</h1>
  <p id="text">Click BOLO if you dare 😏</p>
  <p class="small-text" id="subText">😂 Don’t worry… BOLO will make it solve.</p>

  <div class="bolo-text" id="boloText">👉 BOLO 👈</div>
</div>

<script>
  const jokes = [
    "Tu legend hai... bas tera WiFi slow hai 😭",
    "Life set hoti... agar tu thoda serious hota 🤡",
    "Crush tujhe dekh ke offline ho jati hai 😂",
    "Tu developer hai ya bug generator? 🐛",
    "Salary nahi, sirf experience mil raha hai 😭"
  ];

  const bolo = document.getElementById('boloText');

  function changeBackground() {
    const colors = [
      'linear-gradient(135deg, #ff4d4d, #ffcc00)',
      'linear-gradient(135deg, #00c9ff, #92fe9d)',
      'linear-gradient(135deg, #f953c6, #b91d73)',
      'linear-gradient(135deg, #43cea2, #185a9d)',
      'linear-gradient(135deg, #ff9966, #ff5e62)'
    ];

    document.body.style.background = colors[Math.floor(Math.random() * colors.length)];
  }

  bolo.addEventListener('mouseover', changeBackground);

  bolo.addEventListener('click', () => {
    const random = jokes[Math.floor(Math.random() * jokes.length)];

    // Hide other elements
    document.getElementById('title').style.display = 'none';
    document.getElementById('subText').style.display = 'none';
    bolo.style.display = 'none';

    // Show only bold joke
    const textEl = document.getElementById('text');
    textEl.innerText = random;
    textEl.style.fontSize = '30px';
    textEl.style.fontWeight = 'bold';
    textEl.style.animation = 'none';

    createEmoji();
  });

  function createEmoji() {
    const emoji = document.createElement('div');
    emoji.classList.add('emoji');
    emoji.innerText = ['😂','🔥','🤡','😎','😭'][Math.floor(Math.random()*5)];

    emoji.style.left = Math.random() * window.innerWidth + 'px';
    emoji.style.fontSize = (20 + Math.random() * 40) + 'px';

    document.body.appendChild(emoji);

    setTimeout(() => {
      emoji.remove();
    }, 5000);
  }

  setInterval(createEmoji, 800);
  // Go back button
  const backBtn = document.createElement('div');
  backBtn.innerText = '⬅️ Go Back';
  backBtn.style.position = 'fixed';
  backBtn.style.bottom = '20px';
  backBtn.style.left = '20px';
  backBtn.style.padding = '10px 20px';
  backBtn.style.background = '#000';
  backBtn.style.color = '#fff';
  backBtn.style.borderRadius = '20px';
  backBtn.style.cursor = 'pointer';
  backBtn.style.display = 'none';
  backBtn.style.fontWeight = 'bold';
  backBtn.style.zIndex = '1000';

  document.body.appendChild(backBtn);

  // Show back button after click
  bolo.addEventListener('click', () => {
    backBtn.style.display = 'block';
  });

  // Reload page on back
  backBtn.addEventListener('click', () => {
    location.reload();
  });

</script>

</body>
</html>
