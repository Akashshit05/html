<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TL K Bolo 😂</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Comic Sans MS', cursive;
    }

    body {
     background: #516b8b;  /* fallback for old browsers */
background: -webkit-linear-gradient(to right, #056b3b, #516b8b);  /* Chrome 10-25, Safari 5.1-6 */
background: linear-gradient(to right, #056b3b, #516b8b); /* W3C, IE 10+/ Edge, Firefox 16+, Chrome 26+, Opera 12+, Safari 7+ */

      height: 100vh;
      overflow: hidden;
      position: relative;
      transition: background 0.4s ease;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      text-align: center;
      color: #fff;
    }

    h1 {
      font-size: 60px;
      animation: bounce 1s infinite alternate;
      text-shadow: 3px 3px 0 #000;
    }

    #text {
      margin-top: 20px;
      font-size: 22px;
      animation: shake 0.5s infinite;
      cursor: pointer;
    }

    .small-text {
      margin-top: 10px;
      font-weight: bold;
    }

    .bolo-text {
      margin-top: 20px;
      font-size: 26px;
      font-weight: bold;
      cursor: pointer;
      display: inline-block;
      padding: 10px 20px;
      background: #000;
      border-radius: 50px;
      transition: 0.3s;
    }

    .bolo-text:hover {
      background: #fff;
      color: #000;
      transform: scale(1.2) rotate(5deg);
    }

    .emoji {
      position: absolute;
      font-size: 30px;
      animation: float 5s linear infinite;
    }

    @keyframes bounce {
      from { transform: translateY(0); }
      to { transform: translateY(-30px); }
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-5px); }
      100% { transform: translateX(0); }
    }

    @keyframes float {
      0% {
        transform: translateY(100vh) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh) rotate(360deg);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

<div class="container" id="container">
  <h1 id="title">TL কে বলো</h1>
  <p id="text">Click the button if you dare 😏</p>
  <p class="small-text" id="subText">😂 Don’t worry… TL will make it solve.</p>

  <div class="bolo-text" id="boloText">👉 BOLO 👈</div>
</div>

<script>
const jokes = [
  "Tu legend hai... bas tera WiFi slow hai 😭",
  "Life set hoti... agar tu thoda serious hota 🤡",
  "Crush tujhe dekh ke offline ho jati hai 😂",
  "Tu developer hai ya bug generator? 🐛",
  "Salary nahi, sirf experience mil raha hai 😭",
  "Tera code chal gaya? Screenshot bhej warna jhooth hai 😏",
  "Tu gym gaya tha ya attendance mark karke aa gaya? 😆",
  "Tera future bright hai... bas light ka bill bhar de 💡",
  "Error 404: Teri motivation not found 🤡",
  "Tu smart hai... bas system hang ho jata hai kabhi kabhi 😭",
  "Tera luck bhi buffering me chal raha hai ⏳",
  "Tu plan banata achha hai... execute kab karega? 😂",
  "Teri life ek open tab jaisi hai — kabhi close hi nahi hoti 😆",
  "Tu padhai karta hai ya sirf highlighter use karta hai? 🤓",
  "Tera crush tujhe dekh ke airplane mode laga deta hai ✈️😂"
];

  const bolo = document.getElementById('boloText');
  const container = document.getElementById('container');

  function changeBackground() {
    const colors = [
    'linear-gradient(135deg, #1f4037, #99f2c8)', // green
    'linear-gradient(135deg, #00c6ff, #0072ff)', // blue
    'linear-gradient(135deg, #7f00ff, #e100ff)', // purple
    'linear-gradient(135deg, #43cea2, #185a9d)', // teal
    'linear-gradient(135deg, #f7971e, #ffd200)'  // warm yellow
  ];

    document.body.style.background = colors[Math.floor(Math.random() * colors.length)];
  }

  bolo.addEventListener('mouseover', changeBackground);

  // CLICK BOLO → SHOW INPUT FORM
  bolo.addEventListener('click', () => {

    container.innerHTML = `
      <h1>Bol Bhai 😎</h1>
      <input id="userInput" type="text" placeholder="Apna dard likh..." 
        style="padding:12px; width:250px; border-radius:20px; border:none; outline:none; margin-top:20px;" />
      <br><br>
      <button id="submitBtn" 
        style="padding:10px 20px; border:none; border-radius:20px; background:black; color:white; cursor:pointer;">
        Submit 🚀
      </button>
    `;

    document.getElementById('submitBtn').addEventListener('click', showJoke);
  });

  // SHOW JOKE AFTER SUBMIT
  function showJoke() {
    const input = document.getElementById('userInput').value;

    const random = jokes[Math.floor(Math.random() * jokes.length)];

    container.innerHTML = `
      <h1 style="font-size:40px;">😂 Result</h1>
      <p style="margin-top:20px; font-size:18px;">Tum bola: "${input}"</p>
      <p style="margin-top:20px; font-size:26px; font-weight:bold;">${random}</p>

      <div id="backBtn" 
        style="margin-top:30px; padding:10px 20px; background:black; color:white; border-radius:20px; cursor:pointer;">
        ⬅️ Go Back
      </div>
    `;

    createEmoji();

    document.getElementById('backBtn').addEventListener('click', () => {
      location.reload();
    });
  }

  function createEmoji() {
    const emoji = document.createElement('div');
    emoji.classList.add('emoji');
    emoji.innerText = ['😂','🔥','🤡','😎','😭'][Math.floor(Math.random()*5)];

    emoji.style.left = Math.random() * window.innerWidth + 'px';
    emoji.style.fontSize = (20 + Math.random() * 40) + 'px';

    document.body.appendChild(emoji);

    setTimeout(() => {
      emoji.remove();
    }, 5000);
  }

  setInterval(createEmoji, 800);
</script>

</body>
</html>
